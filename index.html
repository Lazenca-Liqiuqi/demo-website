<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Demo | 产品演示页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <header class="site-header">
    <div class="brand">NOVA</div>
    <a class="btn ghost" href="#contact">联系我</a>
  </header>

  <main>
    <section class="hero">
      <p class="tag">DEMO WEBSITE</p>
      <h1>一个可立即演示的现代网站模板</h1>
      <p class="lead">适合产品介绍、路演展示、课程作业和技术面试作品。移动端与桌面端都可直接使用。</p>
      <div class="actions">
        <a class="btn" href="#features">查看功能</a>
        <a class="btn ghost" href="#stats">实时数据</a>
      </div>
    </section>

    <section id="features" class="features">
      <article class="card">
        <h3>响应式布局</h3>
        <p>自适应手机、平板和桌面端，无需额外修改。</p>
      </article>
      <article class="card">
        <h3>视觉风格鲜明</h3>
        <p>渐变背景、网格光效与卡片层次，适合演示场景。</p>
      </article>
      <article class="card">
        <h3>轻量易部署</h3>
        <p>纯静态文件，可一键部署到 GitHub Pages。</p>
      </article>
    </section>

    <section id="stats" class="stats">
      <div class="stat">
        <span class="value" data-target="98">0</span>
        <span class="label">页面性能分</span>
      </div>
      <div class="stat">
        <span class="value" data-target="3">0</span>
        <span class="label">核心模块</span>
      </div>
      <div class="stat">
        <span class="value" data-target="100">0</span>
        <span class="label">静态可部署</span>
      </div>
    </section>
  </main>

  <footer id="contact" class="site-footer">
    <p>© 2026 Nova Demo. Built for presentation.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
