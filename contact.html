<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Demo | 联系方式</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <header class="site-header">
    <a class="brand-link" href="index.html">NOVA</a>
    <nav class="site-nav">
      <a class="nav-link" href="index.html">首页</a>
      <a class="nav-link" href="about.html">介绍</a>
      <a class="nav-link" href="showcase.html">案例</a>
      <a class="nav-link active" href="contact.html">联系</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <p class="tag">CONTACT</p>
      <h1>联系页面示例</h1>
      <p class="lead">这是静态演示版，表单不会提交到后端。后续可接入邮箱、飞书或 API 服务。</p>
    </section>

    <section class="contact-wrap">
      <article class="card form-preview">
        <div class="form-row">
          <label for="name">姓名</label>
          <input id="name" class="field" type="text" placeholder="请输入你的姓名">
        </div>
        <div class="form-row">
          <label for="email">邮箱</label>
          <input id="email" class="field" type="email" placeholder="you@example.com">
        </div>
        <div class="form-row">
          <label for="message">需求</label>
          <textarea id="message" class="field" rows="5" placeholder="你希望我帮你做什么网站？"></textarea>
        </div>
        <a class="btn" href="mailto:hello@example.com">发送邮件</a>
      </article>

      <article class="card contact-info">
        <h3>沟通信息</h3>
        <p>邮箱: hello@example.com</p>
        <p>微信: demo-web-2026</p>
        <p>工作日响应: 24 小时内</p>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Nova Demo. Built for presentation.</p>
  </footer>
</body>
</html>
